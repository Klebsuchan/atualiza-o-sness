<!DOCTYPE html>
<html>
<head>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: black; }
  .iframe-container {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .iframe-wrapper {
    position: absolute;
    /* Force iframe to mobile width */
    width: 760px;
    height: 1200px;
    /* Shift it up by the top offset (approx 140px) */
    top: -140px;
    left: 50%;
    margin-left: -380px; /* half of 760px */
    transform-origin: top center;
  }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>
<div class="iframe-container">
  <div class="iframe-wrapper" id="wrapper">
    <iframe src="https://ssega.com/game/a-bugs-life"></iframe>
  </div>
</div>
<script>
  // Scale the wrapper to fit the container width
  function resize() {
    const container = document.querySelector('.iframe-container');
    const wrapper = document.getElementById('wrapper');
    const scaleX = container.clientWidth / 760;
    // We want to scale it such that the width fits the container, but maybe limit max scale
    const scale = Math.min(scaleX, (container.clientHeight + 140) / 570); // 570 is approx height of canvas
    wrapper.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
