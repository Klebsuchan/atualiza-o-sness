<!DOCTYPE html>
<html>
<head>
<style>
  body { visibility: hidden; background: black; overflow: hidden; margin: 0; }
  #wrap { visibility: visible; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #111; }
  button { visibility: visible; position: absolute; z-index: 100; }
</style>
</head>
<body>
  <h1>Hide me</h1>
  <div>
    <p>Hide this too</p>
    <div id="wrap">
      <div style="width: 320px; height: 240px; background: blue; visibility: visible;">CANVAS</div>
      <button>Start</button>
    </div>
  </div>
</body>
</html>
